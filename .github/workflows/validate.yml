name: Validate contracts

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run compile
      - name: Run contract tests
        id: contract-tests
        shell: bash
        run: |
          set +e
          npm test -- --reporter spec > contract-test-output.txt 2>&1
          status=$?
          cat contract-test-output.txt
          exit $status
      - name: Upload contract test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-output
          path: contract-test-output.txt
          if-no-files-found: error
